# =============================================================================
#  nginx — emac.moph.go.th (domain เดี่ยวของ eMAC เอง, ไม่แชร์กับ service อื่น)
#
#  backend  : pm2 emac-api  → 127.0.0.1:3100  (HTTP_BASE_PATH ว่าง → mount ที่ root)
#  frontend : ไฟล์ static ที่ build แล้ว (emac-frontend/dist) → nginx serve ตรง ๆ
#             (ไม่ต้องรัน vite preview ผ่าน pm2 บน production — เร็ว/เสถียรกว่า)
#
#  หลักการ: /auth /api /embed → backend (pass-through, ไม่ strip prefix)
#           อย่างอื่นทั้งหมด → static file ของ frontend (SPA fallback → index.html)
#
#  วางไฟล์: /etc/nginx/conf.d/emac-production.conf  แล้ว `nginx -t && systemctl reload nginx`
#  แก้ path /var/www/emac-frontend/dist ให้ตรงกับที่ deploy จริงบนเครื่อง
# =============================================================================

upstream emac_api_upstream {
    server 127.0.0.1:3100;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=emac_rl:10m rate=20r/s;

# ---- redirect HTTP → HTTPS ----
server {
    listen 80;
    server_name emac.moph.go.th;
    return 301 https://$host$request_uri;
}

# ---- HTTPS ----
server {
    listen 443 ssl;
    http2 on;
    server_name emac.moph.go.th;

    # ---- TLS (แก้ path ให้ตรงกับ cert จริงบน server) ----
    ssl_certificate     /etc/ssl/moph/emac.fullchain.pem;
    ssl_certificate_key /etc/ssl/moph/emac.privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- security headers (ระดับข้อมูลสุขภาพ + PDPA) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 5m;

    # =========================================================================
    #  Backend — auth / data / embed (root path, ไม่มี prefix เพราะ domain เดี่ยว)
    # =========================================================================
    location /auth/ {
        limit_req zone=emac_rl burst=40 nodelay;
        proxy_pass http://emac_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        limit_req zone=emac_rl burst=40 nodelay;
        proxy_pass http://emac_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /embed/ {
        proxy_pass http://emac_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://emac_api_upstream;
        access_log off;
    }

    # =========================================================================
    #  Frontend — static build (emac-frontend: npm run build:emac → dist/)
    # =========================================================================
    root /var/www/emac-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache แบบ hash ในชื่อไฟล์ (vite build assets) ได้นาน ๆ
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
