# =============================================================================
#  nginx reverse proxy — api-mophlink.moph.go.th (shared domain, หลาย service)
#  Drug Allergy API ให้บริการที่ path:  https://api-mophlink.moph.go.th/drugallergy
# =============================================================================
#
#  หลักการ:
#   - domain นี้แชร์หลาย service → แยกด้วย path prefix (location /<service>/)
#   - ไม่ strip prefix: ส่ง URI เต็มไปให้ backend (แอป mount ใต้ HTTP_BASE_PATH=/drugallergy)
#     → absolute URL (OIDC redirect, QR, PDF) ตรงกับ public path เสมอ ไม่มี mismatch
#   - ตั้ง X-Forwarded-* ให้แอป (TRUST_PROXY=true) เพื่อให้ได้ scheme/host/ip จริง
#
#  วางไฟล์: /etc/nginx/conf.d/api-mophlink.conf  แล้ว `nginx -t && systemctl reload nginx`
# =============================================================================

# ---- upstream: instance ของ Drug Allergy API (PM2 cluster / หลาย container) ----
upstream drugallergy_upstream {
    # เพิ่ม server หลายบรรทัดเพื่อ scale แนวนอน (load balance อัตโนมัติ)
    server 127.0.0.1:3000;
    # server 127.0.0.1:3001;
    keepalive 32;
}

# ---- rate limit (กัน abuse; ปรับ rate ตามจริง) ----
limit_req_zone $binary_remote_addr zone=drugallergy_rl:10m rate=20r/s;

# ---- redirect HTTP → HTTPS ----
server {
    listen 80;
    server_name api-mophlink.moph.go.th;
    return 301 https://$host$request_uri;
}

# ---- HTTPS ----
server {
    listen 443 ssl;
    http2 on;
    server_name api-mophlink.moph.go.th;

    # ---- TLS ----
    ssl_certificate     /etc/ssl/moph/api-mophlink.fullchain.pem;
    ssl_certificate_key /etc/ssl/moph/api-mophlink.privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- security headers (ระดับข้อมูลสุขภาพ + PDPA) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # body สูงสุด (parquet ไม่ผ่าน nginx แต่กัน payload ใหญ่)
    client_max_body_size 5m;

    # =========================================================================
    #  Drug Allergy API  →  /drugallergy
    # =========================================================================
    location /drugallergy/ {
        limit_req zone=drugallergy_rl burst=40 nodelay;

        # ไม่ strip prefix: proxy_pass ไม่มี trailing path → ส่ง URI เต็ม (/drugallergy/...)
        proxy_pass http://drugallergy_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-Id      $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # health check ของ service นี้ (ให้ LB/uptime probe เรียกได้)
    location = /drugallergy/healthz {
        proxy_pass http://drugallergy_upstream;
        access_log off;
    }

    # -------------------------------------------------------------------------
    #  service อื่น ๆ บน domain เดียวกัน — เพิ่ม location ตามรูปแบบเดียวกัน
    #  location /another-service/ { proxy_pass http://another_upstream; ... }
    # -------------------------------------------------------------------------

    # ไม่ match service ใด → 404
    location / {
        return 404;
    }
}
