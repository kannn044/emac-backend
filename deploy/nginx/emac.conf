# ===== eMAC (Drug Allergy Card) — เพิ่ม location เหล่านี้ใน server { } ของ poc.moph.go.th =====
# backend  : pm2 emac-api  → 127.0.0.1:3100  (Express, HTTP_BASE_PATH=/emac → mount ทุก route ใต้ /emac)
# frontend : pm2 emac-web  → 127.0.0.1:4180  (vite preview, base=/emac/)
#
# หลักการ: nginx "ไม่ strip prefix" (proxy_pass ไม่มี / ท้าย → ส่ง path เดิมทั้งดุ้น)
# backend เห็น path ตรงกับที่ mount (/emac/auth/..., /emac/api/v1/...) → URL สะอาด ชั้น api เดียว
# nginx เลือก longest-prefix: /emac/auth /emac/api /emac/embed ถูก match ก่อน /emac (frontend)

# --- API: auth / data / embed → backend (pass-through, ไม่ strip) ---
location /emac/auth/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
location /emac/api/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
location /emac/embed/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Frontend: vite preview (base=/emac/) ---
location /emac {
    if ($request_uri = /emac) {
        return 301 /emac/;
    }
    proxy_pass http://127.0.0.1:4180;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
}
