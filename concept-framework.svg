<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="820" viewBox="0 0 1520 820" font-family="Sarabun, sans-serif">
  <rect width="1520" height="820" fill="#f6f8fc"/>

  <!-- Title -->
  <text x="760" y="58" text-anchor="middle" font-size="40" font-weight="bold" fill="#16335f">กรอบแนวคิด: ระบบบัตรแพ้ยาดิจิทัล</text>
  <text x="760" y="98" text-anchor="middle" font-size="22" fill="#5a6b85">เปลี่ยนประวัติแพ้ยาที่กระจัดกระจาย ให้เป็น “บัตรเดียวที่เชื่อถือได้” ติดตัวคนไข้ไปทุกโรงพยาบาล</text>

  <!-- ===== 5 STEP CARDS ===== -->
  <!-- card template: x positions 40,332,624,916,1208 ; width 272 ; y 150 h 360 -->

  <!-- arrows between cards -->
  <g fill="#b9c4d6">
    <polygon points="312,330 332,330 332,322 352,338 332,354 332,346 312,346"/>
    <polygon points="604,330 624,330 624,322 644,338 624,354 624,346 604,346"/>
    <polygon points="896,330 916,330 916,322 936,338 916,354 916,346 896,346"/>
    <polygon points="1188,330 1208,330 1208,322 1228,338 1208,354 1208,346 1188,346"/>
  </g>

  <!-- CARD 1 -->
  <g>
    <rect x="40" y="150" width="272" height="372" rx="16" fill="#ffffff" stroke="#dbe3f0" stroke-width="1.5"/>
    <rect x="40" y="150" width="272" height="78" rx="16" fill="#e3f0ff"/>
    <rect x="40" y="200" width="272" height="28" fill="#e3f0ff"/>
    <circle cx="86" cy="189" r="26" fill="#1f78d1"/>
    <text x="86" y="199" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">1</text>
    <text x="128" y="184" font-size="22" font-weight="bold" fill="#16335f">รวบรวม</text>
    <text x="128" y="212" font-size="22" font-weight="bold" fill="#16335f">ประวัติ</text>
    <text x="62" y="270" font-size="19" fill="#33415c">ระบบไล่หาว่าคนไข้เคย</text>
    <text x="62" y="296" font-size="19" fill="#33415c">ได้ยาอะไร จากโรงพยาบาล</text>
    <text x="62" y="322" font-size="19" fill="#33415c">ไหนบ้าง ไม่ใช่แค่ที่เดียว</text>
    <line x1="62" y1="346" x2="290" y2="346" stroke="#eceff5" stroke-width="2"/>
    <text x="62" y="378" font-size="17" fill="#1f78d1" font-weight="bold">เปรียบเหมือน</text>
    <text x="62" y="406" font-size="18" fill="#5a6b85">รวมประวัติที่กระจัด</text>
    <text x="62" y="430" font-size="18" fill="#5a6b85">กระจายจากทุกที่</text>
    <text x="62" y="454" font-size="18" fill="#5a6b85">มาไว้ในแฟ้มเดียว</text>
  </g>

  <!-- CARD 2 -->
  <g>
    <rect x="332" y="150" width="272" height="372" rx="16" fill="#ffffff" stroke="#dbe3f0" stroke-width="1.5"/>
    <rect x="332" y="150" width="272" height="78" rx="16" fill="#e4f6ea"/>
    <rect x="332" y="200" width="272" height="28" fill="#e4f6ea"/>
    <circle cx="378" cy="189" r="26" fill="#2e9e54"/>
    <text x="378" y="199" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">2</text>
    <text x="420" y="184" font-size="22" font-weight="bold" fill="#16335f">ผู้เชี่ยวชาญ</text>
    <text x="420" y="212" font-size="22" font-weight="bold" fill="#16335f">รับรอง</text>
    <text x="354" y="270" font-size="19" fill="#33415c">เภสัชกร/แพทย์ ตรวจสอบ</text>
    <text x="354" y="296" font-size="19" fill="#33415c">แล้วยืนยันว่าแพ้ยานี้จริง</text>
    <text x="354" y="322" font-size="19" fill="#33415c">พร้อมเซ็นกำกับชื่อไว้</text>
    <line x1="354" y1="346" x2="582" y2="346" stroke="#eceff5" stroke-width="2"/>
    <text x="354" y="378" font-size="17" fill="#2e9e54" font-weight="bold">เปรียบเหมือน</text>
    <text x="354" y="406" font-size="18" fill="#5a6b85">คุณหมอเซ็นรับรอง</text>
    <text x="354" y="430" font-size="18" fill="#5a6b85">บนใบรับรองแพทย์</text>
  </g>

  <!-- CARD 3 -->
  <g>
    <rect x="624" y="150" width="272" height="372" rx="16" fill="#ffffff" stroke="#dbe3f0" stroke-width="1.5"/>
    <rect x="624" y="150" width="272" height="78" rx="16" fill="#f1e8fb"/>
    <rect x="624" y="200" width="272" height="28" fill="#f1e8fb"/>
    <circle cx="670" cy="189" r="26" fill="#8043c4"/>
    <text x="670" y="199" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">3</text>
    <text x="712" y="184" font-size="22" font-weight="bold" fill="#16335f">บัตรที่</text>
    <text x="712" y="212" font-size="22" font-weight="bold" fill="#16335f">ปลอมไม่ได้</text>
    <text x="646" y="270" font-size="19" fill="#33415c">ออกบัตรแพ้ยาดิจิทัล</text>
    <text x="646" y="296" font-size="19" fill="#33415c">ที่มีตราประทับกันปลอม</text>
    <text x="646" y="322" font-size="19" fill="#33415c">ตรวจความแท้ได้เสมอ</text>
    <line x1="646" y1="346" x2="874" y2="346" stroke="#eceff5" stroke-width="2"/>
    <text x="646" y="378" font-size="17" fill="#8043c4" font-weight="bold">เปรียบเหมือน</text>
    <text x="646" y="406" font-size="18" fill="#5a6b85">ลายน้ำบนธนบัตร</text>
    <text x="646" y="430" font-size="18" fill="#5a6b85">ใครก็ดูออกว่าของจริง</text>
  </g>

  <!-- CARD 4 -->
  <g>
    <rect x="916" y="150" width="272" height="372" rx="16" fill="#ffffff" stroke="#dbe3f0" stroke-width="1.5"/>
    <rect x="916" y="150" width="272" height="78" rx="16" fill="#fff0db"/>
    <rect x="916" y="200" width="272" height="28" fill="#fff0db"/>
    <circle cx="962" cy="189" r="26" fill="#e08a1e"/>
    <text x="962" y="199" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">4</text>
    <text x="1004" y="184" font-size="22" font-weight="bold" fill="#16335f">คนไข้เป็น</text>
    <text x="1004" y="212" font-size="22" font-weight="bold" fill="#16335f">เจ้าของ</text>
    <text x="938" y="270" font-size="19" fill="#33415c">บัตรอยู่ในแอปหมอพร้อม</text>
    <text x="938" y="296" font-size="19" fill="#33415c">คนไข้เลือกเองว่าจะให้</text>
    <text x="938" y="322" font-size="19" fill="#33415c">โรงพยาบาลไหนดู</text>
    <line x1="938" y1="346" x2="1166" y2="346" stroke="#eceff5" stroke-width="2"/>
    <text x="938" y="378" font-size="17" fill="#e08a1e" font-weight="bold">เปรียบเหมือน</text>
    <text x="938" y="406" font-size="18" fill="#5a6b85">เปิดกระเป๋าให้ดูเอง</text>
    <text x="938" y="430" font-size="18" fill="#5a6b85">ไม่มีใครแอบหยิบได้</text>
  </g>

  <!-- CARD 5 -->
  <g>
    <rect x="1208" y="150" width="272" height="372" rx="16" fill="#ffffff" stroke="#dbe3f0" stroke-width="1.5"/>
    <rect x="1208" y="150" width="272" height="78" rx="16" fill="#fde7e7"/>
    <rect x="1208" y="200" width="272" height="28" fill="#fde7e7"/>
    <circle cx="1254" cy="189" r="26" fill="#cf3b3b"/>
    <text x="1254" y="199" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff">5</text>
    <text x="1296" y="184" font-size="22" font-weight="bold" fill="#16335f">เกราะ</text>
    <text x="1296" y="212" font-size="22" font-weight="bold" fill="#16335f">ตลอดชีวิต</text>
    <text x="1230" y="270" font-size="19" fill="#33415c">ทุกโรงพยาบาลเช็คบัตร</text>
    <text x="1230" y="296" font-size="19" fill="#33415c">ก่อนจ่ายยา</text>
    <text x="1230" y="322" font-size="19" fill="#33415c">กันการแพ้ยาซ้ำ</text>
    <line x1="1230" y1="346" x2="1458" y2="346" stroke="#eceff5" stroke-width="2"/>
    <text x="1230" y="378" font-size="17" fill="#cf3b3b" font-weight="bold">เปรียบเหมือน</text>
    <text x="1230" y="406" font-size="18" fill="#5a6b85">สัญญาณเตือนที่</text>
    <text x="1230" y="430" font-size="18" fill="#5a6b85">ติดตามคนไข้ไปทุกที่</text>
  </g>

  <!-- ===== HEART OF SYSTEM ===== -->
  <text x="760" y="588" text-anchor="middle" font-size="24" font-weight="bold" fill="#16335f">หัวใจของระบบ 3 ข้อ</text>

  <g>
    <rect x="120" y="612" width="400" height="150" rx="14" fill="#eef4ff" stroke="#c7d6ee" stroke-width="1.5"/>
    <text x="320" y="664" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f78d1">เชื่อถือได้</text>
    <text x="320" y="702" text-anchor="middle" font-size="19" fill="#33415c">ผู้เชี่ยวชาญรับรอง</text>
    <text x="320" y="728" text-anchor="middle" font-size="19" fill="#33415c">และมีตรากันปลอม</text>
  </g>
  <g>
    <rect x="560" y="612" width="400" height="150" rx="14" fill="#fff6e9" stroke="#f0dcbb" stroke-width="1.5"/>
    <text x="760" y="664" text-anchor="middle" font-size="24" font-weight="bold" fill="#e08a1e">คนไข้เป็นเจ้าของ</text>
    <text x="760" y="702" text-anchor="middle" font-size="19" fill="#33415c">ต้องได้รับความยินยอม</text>
    <text x="760" y="728" text-anchor="middle" font-size="19" fill="#33415c">ก่อนถึงจะแชร์ได้</text>
  </g>
  <g>
    <rect x="1000" y="612" width="400" height="150" rx="14" fill="#eafaef" stroke="#c2e7cf" stroke-width="1.5"/>
    <text x="1200" y="664" text-anchor="middle" font-size="24" font-weight="bold" fill="#2e9e54">ใช้ได้ทั้งประเทศ</text>
    <text x="1200" y="702" text-anchor="middle" font-size="19" fill="#33415c">เชื่อมโยงทุกโรงพยาบาล</text>
    <text x="1200" y="728" text-anchor="middle" font-size="19" fill="#33415c">ไปที่ไหนก็ปลอดภัย</text>
  </g>

  <text x="760" y="800" text-anchor="middle" font-size="16" fill="#9aa7bd">ระบบบัตรแพ้ยาดิจิทัล • กรอบแนวคิดอย่างง่ายสำหรับผู้ใช้งาน</text>
</svg>
